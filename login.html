<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | TRON Portfolio</title>

  <!-- CSS Stylesheet (Relative path for local and static hosting) -->
  <link rel="stylesheet" href="static/css/style.css" />
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Theme Initialization Script to prevent flash of wrong color -->
  <script>
    (function() {
      const theme = localStorage.getItem('tron-portfolio-theme') || 'cyan';
      document.body.className = 'theme-' + theme;
    })();
  </script>

  <!-- Decorative background -->
  <div class="tron-bg">
    <div class="tron-grid"></div>
    <div class="tron-scanlines"></div>
    <div class="tron-vignette"></div>
  </div>

  <header class="tron-header">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-text">Thilak Raj</span>
    </div>

    <nav class="tron-nav" aria-label="Primary">
      <a class="tron-link" href="index.html#home">Home</a>
      <a class="tron-link" href="index.html#about">About</a>
      <a class="tron-link" href="index.html#projects">Projects</a>
      <a class="tron-link" href="index.html#contact">Contact</a>
      <a class="tron-link" href="login.html">Login</a>
    </nav>

    <div style="display: flex; align-items: center; gap: 15px;">
      <!-- Theme Accent Picker -->
      <div class="theme-picker" title="Select Neon Accent">
        <div class="theme-dot theme-dot--cyan" data-theme="cyan" onclick="setTheme('cyan')"></div>
        <div class="theme-dot theme-dot--pink" data-theme="pink" onclick="setTheme('pink')"></div>
        <div class="theme-dot theme-dot--green" data-theme="green" onclick="setTheme('green')"></div>
        <div class="theme-dot theme-dot--amber" data-theme="amber" onclick="setTheme('amber')"></div>
      </div>

      <div class="tron-status" title="System status">
        <span class="dot dot--on"></span>
        <span class="status-text">LIVE</span>
      </div>
    </div>
  </header>

  <main class="tron-main">
    <section class="section flex-center" style="min-height: 70vh; flex-direction: column; padding: 0;">
      <h2 class="section-title" style="display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 25px;">
        <i data-lucide="shield-alert" class="neon" style="width: 24px; height: 24px;"></i> SECURE MAINFRAME LOG
      </h2>

      <div class="card form-card card--glow" style="max-width: 440px; width: 100%;">
        <div style="border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 15px; margin-bottom: 20px; text-align: center;">
          <h3 class="card-title" style="margin: 0; font-size: 1.15rem; color: #fff; letter-spacing: 0.1em; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <i data-lucide="key-round" style="color: var(--cyan); width: 18px; height: 18px;"></i> ACCESS KEY REQUIRED
          </h3>
          <p class="muted" style="margin: 6px 0 0 0; font-size: 0.82rem;">
            AUTHORIZED COGNITIVE ENTITIES ONLY
          </p>
        </div>

        <form class="form" id="login-form" onsubmit="event.preventDefault(); alert('Handshake bypassed. Direct local storage loaded (simulation).');">
          <!-- Username/Email Field -->
          <div>
            <label class="label" for="email" style="display: flex; align-items: center; gap: 6px; font-size: 0.85rem; margin-bottom: 6px;">
              <i data-lucide="user" style="color: var(--cyan); width: 14px; height: 14px;"></i> Email Node
            </label>
            <div style="position: relative;">
              <input id="email" class="input" type="email" placeholder="designation@grid.com" required style="padding-left: 36px;" />
              <i data-lucide="mail" style="position: absolute; left: 12px; top: 13px; width: 16px; height: 16px; color: var(--muted); pointer-events: none;"></i>
            </div>
          </div>

          <!-- Password Field -->
          <div style="margin-top: 5px;">
            <label class="label" for="password" style="display: flex; align-items: center; gap: 6px; font-size: 0.85rem; margin-bottom: 6px;">
              <i data-lucide="lock" style="color: var(--cyan); width: 14px; height: 14px;"></i> Access Code
            </label>
            <div style="position: relative;">
              <input id="password" class="input" type="password" placeholder="••••••••" required style="padding-left: 36px;" />
              <i data-lucide="fingerprint" style="position: absolute; left: 12px; top: 13px; width: 16px; height: 16px; color: var(--muted); pointer-events: none;"></i>
            </div>
          </div>

          <!-- Sign In Button -->
          <button class="btn btn--primary btn--full" type="submit" style="margin-top: 15px;">
            <i data-lucide="log-in" style="width: 18px; height: 18px;"></i> Establish Connection
          </button>

          <div style="display: flex; align-items: flex-start; gap: 8px; margin-top: 18px; background: rgba(var(--neon-rgb), 0.04); border: 1px dashed rgba(var(--neon-rgb), 0.2); padding: 10px; border-radius: 8px;">
            <i data-lucide="shield-check" class="neon" style="width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px;"></i>
            <p class="muted" style="margin: 0; font-size: 0.8rem; line-height: 1.4;">
              Simulation Mode Active. Form submission bypasses authorization and loads simulation environment.
            </p>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="tron-footer">
    <div>© 2026 Thilak Raj</div>
    <div class="muted">Student Portfolio • Static Site</div>
  </footer>

  <script>
    // Theme switching logic
    function setTheme(theme) {
      document.body.className = '';
      document.body.classList.add('theme-' + theme);
      
      // Update active state in UI
      document.querySelectorAll('.theme-dot').forEach(dot => {
        dot.classList.remove('active');
        if (dot.getAttribute('data-theme') === theme) {
          dot.classList.add('active');
        }
      });
      
      localStorage.setItem('tron-portfolio-theme', theme);
    }
    
    // Set active dot state on page load
    (function() {
      const activeTheme = localStorage.getItem('tron-portfolio-theme') || 'cyan';
      const activeDot = document.querySelector(`.theme-dot[data-theme="${activeTheme}"]`);
      if (activeDot) activeDot.classList.add('active');
    })();

    // Initialize Lucide Icons
    if (window.lucide) {
      lucide.createIcons();
    }
    
    // Tiny neon flicker (no dependencies)
    (function () {
      const links = document.querySelectorAll('.tron-link');
      setInterval(() => {
        links.forEach((a, i) => {
          if (Math.random() < 0.08) a.classList.add('flicker');
          setTimeout(() => a.classList.remove('flicker'), 120 + (i % 3) * 40);
        });
      }, 1200);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thilak Raj | TRON Portfolio</title>

  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="static/css/style.css" />
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Section Component Templates (Local JS variables bypass CORS on file:// protocol) -->
  <script src="sections/hero.js" defer></script>
  <script src="sections/about.js" defer></script>
  <script src="sections/projects.js" defer></script>
  <script src="sections/contact.js" defer></script>

  <!-- Modular Component Controller (Injects templates and wires interactions) -->
  <script src="static/js/main.js" defer></script>
</head>
<body>
  <!-- Theme Initialization Script to prevent flash of wrong color -->
  <script>
    (function() {
      const theme = localStorage.getItem('tron-portfolio-theme') || 'cyan';
      document.body.className = 'theme-' + theme;
    })();
  </script>

  <!-- Decorative background -->
  <div class="tron-bg">
    <div class="tron-grid"></div>
    <div class="tron-scanlines"></div>
    <div class="tron-vignette"></div>
  </div>

  <header class="tron-header">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-text">Thilak Raj</span>
    </div>

    <nav class="tron-nav" aria-label="Primary">
      <a class="tron-link" href="#home">Home</a>
      <a class="tron-link" href="#about">About</a>
      <a class="tron-link" href="#projects">Projects</a>
      <a class="tron-link" href="#contact">Contact</a>
      <a class="tron-link" href="login.html">Login</a>
    </nav>

    <div style="display: flex; align-items: center; gap: 15px;">
      <!-- Theme Accent Picker -->
      <div class="theme-picker" title="Select Neon Accent">
        <div class="theme-dot theme-dot--cyan" data-theme="cyan" onclick="setTheme('cyan')"></div>
        <div class="theme-dot theme-dot--pink" data-theme="pink" onclick="setTheme('pink')"></div>
        <div class="theme-dot theme-dot--green" data-theme="green" onclick="setTheme('green')"></div>
        <div class="theme-dot theme-dot--amber" data-theme="amber" onclick="setTheme('amber')"></div>
      </div>

      <div class="tron-status" title="System status">
        <span class="dot dot--on"></span>
        <span class="status-text">LIVE</span>
      </div>
    </div>
  </header>

  <main class="tron-main">
    <!-- Component-based Page Sections loaded dynamically via main.js -->
    <div id="hero-section"></div>
    <div id="about-section"></div>
    <div id="projects-section"></div>
    <div id="contact-section"></div>
  </main>

  <footer class="tron-footer">
    <div>© 2026 Thilak Raj</div>
    <div class="muted">Student Portfolio • Modular Static Site</div>
  </footer>
</body>
</html>
